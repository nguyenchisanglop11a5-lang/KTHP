<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Discovery App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #333;
      --card-bg: #fff;
    }
    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #f5f5f5;
      --card-bg: #2c2c2c;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: var(--card-bg);
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    #toggle-theme {
      font-size: 1.2rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    .container {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 10px;
      padding: 10px;
    }

    .sidebar {
      background-color: var(--card-bg);
      padding: 10px;
      border-radius: 5px;
      height: fit-content;
    }

    #genre-filters label, .extra-links a {
      display: block;
      margin-bottom: 5px;
      text-decoration: none;
      color: var(--text-color);
    }

    .main-content {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
      gap: 15px;
    }

    .movie-card {
      background-color: var(--card-bg);
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .movie-card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .movie-card img {
      width: 100%;
      border-radius: 5px;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background-color: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-content img {
      max-width: 100%;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
    }

    input[type="text"] {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    @media(max-width:768px){
      .container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        overflow-x: auto;
        padding: 5px;
      }
      #genre-filters label, .extra-links a {
        margin-right: 0;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>

  <!-- Modal luôn ở đầu body -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <header>
    <h1>Movie Discovery App</h1>
    <button id="toggle-theme">🌙</button>
  </header>

  <div class="container">
    <aside class="sidebar">
      <input type="text" id="search-input" placeholder="Tìm kiếm phim...">
      <div id="genre-filters"></div>

      <div class="extra-links">
        <h3>Bài tập bổ sung</h3>
        <a href="231A011160_sang_bt34.html" target="_blank">Kết quả Bài 34</a>
        <a href="mota.html" target="_blank">Mô tả cách làm</a>
      </div>
    </aside>

    <main class="main-content" id="movie-list"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
